<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>灵感收集站</title>
  <link rel="stylesheet" href="inspiration.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50">

  <!-- 头部 -->
  <header class="py-10 text-center">
    <div class="flex items-center justify-center gap-3 mb-2">
      <span class="text-4xl">💡</span>
      <h1 class="text-4xl font-extrabold text-indigo-700 tracking-tight">灵感收集站</h1>
    </div>
    <p class="text-gray-500 text-sm mt-1">记录每一个闪光的想法</p>
  </header>

  <!-- 输入区 -->
  <main class="max-w-2xl mx-auto px-4">
    <div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
      <label class="block text-gray-600 font-semibold mb-3 text-sm uppercase tracking-widest">写下你的灵感</label>
      <textarea
        id="inspirationInput"
        rows="3"
        placeholder="今天有什么新想法？按 Ctrl+Enter 快速提交..."
        class="w-full resize-none border border-gray-200 rounded-xl px-4 py-3 text-gray-700 text-base focus:outline-none focus:ring-2 focus:ring-indigo-400 transition placeholder-gray-300"
      ></textarea>
      <div class="flex justify-between items-center mt-3">
        <div class="flex items-center gap-2">
          <span id="charCount" class="text-xs text-gray-400">0 字</span>
          <button
            id="voiceBtn"
            title="语音输入"
            class="voice-btn flex items-center gap-1.5 text-sm font-semibold px-3 py-1.5 rounded-xl border border-indigo-200 text-indigo-500 bg-indigo-50 hover:bg-indigo-100 transition"
          >
            <svg id="voiceIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 10a7 7 0 01-14 0M12 19v4M8 23h8"/>
            </svg>
            <span id="voiceLabel">语音</span>
          </button>
        </div>
        <button
          id="submitBtn"
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-6 py-2 rounded-xl shadow transition active:scale-95 flex items-center gap-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          提交灵感
        </button>
      </div>
    </div>

    <!-- 统计栏 -->
    <div class="grid grid-cols-3 gap-4 mb-8" id="statsBar">
      <div class="bg-white rounded-xl shadow p-4 text-center">
        <div id="totalCount" class="text-3xl font-extrabold text-indigo-600">0</div>
        <div class="text-xs text-gray-400 mt-1">总灵感数</div>
      </div>
      <div class="bg-white rounded-xl shadow p-4 text-center">
        <div id="todayCount" class="text-3xl font-extrabold text-pink-500">0</div>
        <div class="text-xs text-gray-400 mt-1">今日收集</div>
      </div>
      <div class="bg-white rounded-xl shadow p-4 text-center">
        <div id="categoryCount" class="text-3xl font-extrabold text-emerald-500">0</div>
        <div class="text-xs text-gray-400 mt-1">分类数量</div>
      </div>
    </div>

    <!-- 分类筛选 -->
    <div id="filterBar" class="flex flex-wrap gap-2 mb-6">
      <button data-filter="all" class="filter-btn active-filter px-4 py-1.5 rounded-full text-sm font-semibold border border-indigo-300 text-indigo-700 bg-indigo-50 transition">全部</button>
    </div>

    <!-- 灵感列表 -->
    <div id="inspirationList" class="space-y-4 pb-16">
      <div id="emptyState" class="text-center py-20 text-gray-300">
        <div class="text-6xl mb-4">🌱</div>
        <p class="text-lg font-medium">还没有灵感，快来记录第一条吧！</p>
      </div>
    </div>
  </main>

  <!-- Toast 提示 -->
  <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-5 py-2.5 rounded-full shadow-lg opacity-0 pointer-events-none transition-all duration-300 z-50">
    ✅ 灵感已收录！
  </div>

  <script src="inspiration.js"></script>
</body>
</html>
